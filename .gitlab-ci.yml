# on9log-host GitLab CI — Rust workspace build + test
#
# Builds on9log-protocol, on9log-cli, on9log-capture.
#
# Rust edition 2024 requires rustc 1.85+.

stages:
  - frontend
  - build
  - test

.default-settings:
  interruptible: true
  tags:
    - longrunning

variables:
  CARGO_HOME: ${CI_PROJECT_DIR}/.cargo
  CARGO_TARGET_DIR: ${CI_PROJECT_DIR}/target
  CARGO_INCREMENTAL: 0

# ---------------------------------------------------------------------------
# Frontend bundle
# ---------------------------------------------------------------------------
web-build:
  stage: frontend
  extends: .default-settings
  image: oven/bun:1
  script:
    - cd on9log-cli/web
    - bun install --frozen-lockfile
    - bun run lint
    - bun run format:check
    - bun run build
  artifacts:
    paths:
      - on9log-cli/web/dist/
    expire_in: 1 day

# ---------------------------------------------------------------------------
# Rust build
# ---------------------------------------------------------------------------
build:
  stage: build
  extends: .default-settings
  image: rust:bullseye
  needs:
    - job: web-build
      artifacts: true
  before_script:
    - rustup component add clippy
  script:
    - cargo build --release
  artifacts:
    paths:
      - target/release/on9log
      - target/release/on9log-capture
    expire_in: 1 day

# ---------------------------------------------------------------------------
# Test + lint
# ---------------------------------------------------------------------------
test:
  stage: test
  extends: .default-settings
  image: rust:bullseye
  needs:
    - job: web-build
      artifacts: true
    - job: build
      artifacts: true
  before_script:
    - rustup component add clippy
  script:
    - cargo test --workspace
    - cargo clippy --workspace --lib --bins --tests -- -D warnings
